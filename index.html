<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>💖 Holiii mi Tamia preciosa 💖</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #ffe6e6;
        }
        h1 {
            color: #d63384;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #si {
            background-color: #28a745;
            color: white;
        }
        #no {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

    <h1>💖 Nose porque, pero me tienes aquí rogandote 💖</h1>
    <p>Eres una personita dificil de sacar de mi mente...</p>
    <h2>¿Solo quiero preguntarte si aún sigues enojada? 💕</h2>

    <button id="si" onclick="responderSi()">Sí 💖</button>
    <button id="no" onclick="responderNo()">No 😢</button>

    <h3 id="respuesta"></h3>

    <script>
        function responderSi() {
            document.getElementById("respuesta").innerHTML = "💖 Segura... Intentalo de nuevo mi Tami 💖";
        }

        function responderNo() {
            document.getElementById("respuesta").innerHTML = "Sabía que no, te quiero mucho mi Tamia preciosa 💖";
        }
    </script>

</body>
</html>
